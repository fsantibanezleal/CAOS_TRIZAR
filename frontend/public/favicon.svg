  <path d="M16 8 L20 18 L16 21 L12 18 Z" fill="#3fb950"/>
  <!-- feed particles falling in -->
  <circle cx="13" cy="5" r="1.5" fill="#58a6ff"/>
  <circle cx="18" cy="4" r="1.1" fill="#58a6ff"/>
  <circle cx="16" cy="6.5" r="1" fill="#58a6ff"/>
  <!-- product discharge -->
  <circle cx="16" cy="27" r="1" fill="#f0f6fc"/>
</svg>
