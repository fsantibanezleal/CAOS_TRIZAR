<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- crusher cavity: fixed concave (outer) + gyrating mantle (inner cone) -->
  <path d="M5 7 L13 19 L13 25 L11 25 L4 9 Z" fill="#d29922"/>
  <path d="M27 7 L19 19 L19 25 L21 25 L28 9 Z" fill="#d29922"/>
