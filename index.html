<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChancaDEM — 3D Crusher-Physics Studio (cone / jaw / gyratory)</title>
    <meta name="description" content="A real, in-browser 3D crusher-physics studio. Set eccentric speed, throw, closed-side-setting and feed size distribution on a cone, jaw or gyratory crusher and watch the product gradation, throughput and power form. Heavy discrete-element runs are precomputed offline into seeded replay traces; a pure-TypeScript Whiten population-balance + Evertsson capacity engine runs live, and two learned ONNX models run in-browser. A didactic comminution sandbox, not a plant control system. Part of the Faena mining-analytics hub." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Pre-paint theme — same localStorage key as the shared shell.
      (function () {
        try {
          var s = localStorage.getItem('caos.theme');
          document.documentElement.dataset.theme = s ? s : matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
